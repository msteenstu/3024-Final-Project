{% extends 'base.html' %}
{% block main %}
    <table>
        <tr class="first-table-header">
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Page Count</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>

        {% if books %}
            {% for book in books %}
                <tr>
                    <td> {{book.title}} </td>
                    <td> {{book.author}} </td>
                    <td> {{book.genre.title()}} </td>
                    <td> {{book.page_count}} </td>
                    <td> {{book.quantity}} </td>
                    <td> {{book.price}} </td>
                </tr>
            {% endfor %}
        {% endif %}

    </table>

    <form method="post" action="{{ url_for('view_books') }}">
    <p>Search by Genre: <input type="text" name="genre" required></p>
    <button type="submit">Search</button>
    </form>

{% endblock %}
